<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品集</title>
    
    <!-- CDN 依赖 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- 本地资源 -->
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../logo.ico">
</head>
<body class="theme-transition min-h-screen">
    <div id="app">
        <!-- 粒子背景容器 -->
        <div id="particles-bg" class="particles-bg"></div>
        
        <!-- 主题选择器 -->
        <div class="theme-selector" v-if="config.themes">
            <div class="glass-card rounded-full p-2 flex space-x-2">
                <button 
                    v-for="theme in config.themes" 
                    :key="theme.id"
                    @click="themeManager.changeTheme(theme.id)"
                    class="w-6 h-6 rounded-full border-2 border-white/30 focus:outline-none transition-transform hover:scale-110"
                    :style="{backgroundColor: theme.color}"
                    :title="theme.name"
                ></button>
            </div>
        </div>
        
        <!-- 主内容区域 -->
        <main class="container mx-auto px-4 py-8 max-w-6xl">
            <!-- 作品集标题 -->
            <section class="glass-card rounded-2xl p-8 mb-8 scroll-reveal" v-if="portfolioConfig.portfolio">
                <h1 class="text-4xl md:text-5xl font-bold text-center mb-4">{{ portfolioConfig.portfolio.title }}</h1>
                <p class="text-lg text-center opacity-90">{{ portfolioConfig.portfolio.description }}</p>
            </section>
            
            <!-- 作品集项目 -->
            <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16" v-if="portfolioConfig.projects">
                <div 
                    v-for="project in portfolioConfig.projects" 
                    :key="project.id"
                    class="glass-card rounded-2xl p-6 hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 scroll-reveal"
                >
                    <!-- 项目图片 -->
                    <div class="mb-4 overflow-hidden rounded-xl">
                        <img 
                            :src="project.image" 
                            :alt="project.title"
                            class="w-full h-48 object-cover transition-transform duration-500 hover:scale-110"
                        >
                    </div>
                    
                    <!-- 项目信息 -->
                    <h2 class="text-xl font-bold mb-2">{{ project.title }}</h2>
                    <p class="text-sm opacity-90 mb-4">{{ project.description }}</p>
                    
                    <!-- 项目分类 -->
                    <div class="mb-4">
                        <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-xs font-medium">{{ project.category }}</span>
                    </div>
                    
                    <!-- 技术栈 -->
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span 
                            v-for="(tech, index) in project.technologies" 
                            :key="index"
                            class="px-2 py-1 bg-white/10 rounded text-xs"
                        >
                            {{ tech }}
                        </span>
                    </div>
                    
                    <!-- 项目链接 -->
                    <div class="flex space-x-3">
                        <a 
                            v-if="project.url" 
                            :href="project.url" 
                            target="_blank"
                            class="flex-1 flex items-center justify-center space-x-2 px-4 py-2 rounded-lg glass-card hover:bg-white/20 transition-all duration-300"
                        >
                            <i class="fas fa-external-link-alt"></i>
                            <span>查看项目</span>
                        </a>
                        <a 
                            v-if="project.github" 
                            :href="project.github" 
                            target="_blank"
                            class="flex items-center justify-center w-10 h-10 rounded-lg glass-card hover:bg-white/20 transition-all duration-300"
                        >
                            <i class="fab fa-github"></i>
                        </a>
                    </div>
                </div>
            </section>
        </main>
        
        <!-- 页脚 -->
        <footer class="pt-16 pb-24 md:pb-32 text-center opacity-80" v-if="config.footer">
            <div class="container mx-auto px-4 max-w-6xl">
                <p>{{ config.footer.copyright }}</p>
                <p class="mt-2" v-html="config.footer.extraInfo"></p>
                
                <!-- 页脚链接 -->
                <div class="flex flex-wrap justify-center gap-6 mt-6" v-if="config.footer.links">
                    <a 
                        v-for="link in config.footer.links" 
                        :key="link.id"
                        :href="link.url"
                        class="hover:text-white/100 transition-colors"
                    >
                        {{ link.name }}
                    </a>
                </div>
            </div>
        </footer>
    </div>
    
    <!-- 本地模块 -->
    <script src="../theme-manager.js"></script>
    <script src="../effects.js"></script>
    <script>
        // 创建作品集Vue应用
        const { createApp, onMounted, reactive } = Vue;
        
        createApp({
            setup() {
                const config = reactive({
                    themes: [
                        { "id": "light", "name": "亮白", "color": "#f8fafc", "bg": "#f1f5f9", "text": "#475569" },
                        { "id": "graphite", "name": "石墨黑", "color": "#64748b", "bg": "#1e293b", "text": "#e2e8f0" },
                        { "id": "lime", "name": "青柠", "color": "#a3e635", "bg": "#fefce8", "text": "#4d7c0f" },
                        { "id": "lemon", "name": "柠黄", "color": "#fde68a", "bg": "#fffbeb", "text": "#a16207" },
                        { "id": "apple", "name": "苹果绿", "color": "#4ade80", "bg": "#f0fdf4", "text": "#166534" },
                        { "id": "water", "name": "水蓝", "color": "#60a5fa", "bg": "#eff6ff", "text": "#1e40af" },
                        { "id": "cherry", "name": "樱红", "color": "#fda4af", "bg": "#fef2f2", "text": "#9f1239" },
                        { "id": "lavender", "name": "薰衣草紫", "color": "#c4b5fd", "bg": "#faf5ff", "text": "#6b21a8" }
                    ],
                    settings: {
                        defaultTheme: "water",
                        enableParticles: true
                    },
                    footer: {
                        copyright: "© 2026 鳞游. 保留所有权利.",
                        extraInfo: "由Vue与Tailwind CSS 构建 | 本页面后端由 <a href='https://www.xiaojiyun.com/aff/WPNPVVXD' target='_blank'>小鸡云</a> 提供 | 我日常玩的免费mc服务器就在这开的 <a href='https://www.xiaojiyun.com/aff/WPNPVVXD' target='_blank'>点击查看</a>",
                        links: [
                            { "id": 1, "name": "隐私政策", "url": "#" },
                            { "id": 2, "name": "使用条款", "url": "#" },
                            { "id": 3, "name": "站点地图", "url": "#" },
                            { "id": 4, "name": "友情链接", "url": "#" }
                        ]
                    }
                });
                
                const portfolioConfig = reactive({
                    portfolio: {
                        title: "我的作品集",
                        description: "展示我的项目作品和技术成果"
                    },
                    projects: [
                        {
                            "id": 1,
                            "title": "个人主页",
                            "description": "使用Vue和Tailwind CSS构建的个人主页，支持主题切换和音乐播放功能",
                            "image": "https://images.unsplash.com/photo-1542744173-8e7e53415bb0?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                            "category": "Web开发",
                            "technologies": ["Vue", "Tailwind CSS", "JavaScript"],
                            "url": "#",
                            "github": "https://github.com/siciyuan"
                        },
                        {
                            "id": 2,
                            "title": "技术博客系统",
                            "description": "基于Node.js和MongoDB的个人技术博客系统，支持Markdown编辑和主题切换",
                            "image": "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                            "category": "全栈开发",
                            "technologies": ["Node.js", "MongoDB", "Express"],
                            "url": "#",
                            "github": "https://github.com/siciyuan"
                        },
                        {
                            "id": 3,
                            "title": "数据分析工具",
                            "description": "使用Python和D3.js开发的数据分析和可视化工具，支持多种数据格式导入",
                            "image": "https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                            "category": "数据科学",
                            "technologies": ["Python", "D3.js", "Pandas"],
                            "url": "#",
                            "github": "https://github.com/siciyuan"
                        },
                        {
                            "id": 4,
                            "title": "移动应用原型",
                            "description": "使用Figma设计的移动应用原型，包含用户界面和交互设计",
                            "image": "https://images.unsplash.com/photo-1556742502-ec7c0e9f34b1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                            "category": "UI/UX设计",
                            "technologies": ["Figma", "UI设计", "UX设计"],
                            "url": "#",
                            "github": "https://github.com/siciyuan"
                        }
                    ]
                });
                
                const themeManager = new ThemeManager();
                
                // 初始化主题
                if (config.settings?.defaultTheme) {
                    themeManager.init(config.themes, config.settings.defaultTheme);
                }
                
                // 初始化粒子效果
                if (config.settings?.enableParticles) {
                    setTimeout(() => themeManager.initParticles(), 100);
                }
                
                // 滚动动画逻辑
                const handleScroll = () => {
                    const elements = document.querySelectorAll('.scroll-reveal');
                    elements.forEach(element => {
                        const elementTop = element.getBoundingClientRect().top;
                        const elementVisible = 150;
                        if (elementTop < window.innerHeight - elementVisible) {
                            element.classList.add('active');
                        }
                    });
                };
                
                onMounted(() => {
                    // 初始加载时触发一次滚动动画
                    handleScroll();
                    
                    // 监听滚动事件
                    window.addEventListener('scroll', handleScroll);
                });
                
                return {
                    config,
                    portfolioConfig,
                    themeManager
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
